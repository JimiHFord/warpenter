name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true' }}
    runs-on: windows-latest
    env:
      PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Enable Pages
        if: ${{ env.PAGES_ADMIN_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.PAGES_ADMIN_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          gh api --method POST "repos/${{ github.repository }}/pages" --field build_type=workflow --silent
          if ($LASTEXITCODE -ne 0) {
            gh api "repos/${{ github.repository }}/pages" --silent
          }

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Install Emscripten
        run: npm run install:emsdk

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE: "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: ${{ github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
